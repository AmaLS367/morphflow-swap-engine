[engine]
profile = balanced
detector_score_threshold = 0.5
detector_iou_threshold = 0.4
detector_batch_size = 8
detector_min_face_size = 8
detector_min_face_ratio = 0.0002
detector_min_centrality = 0.0
target_analysis_sample_count = 5
swap_model_key = ghost_512
enable_restoration = true
enable_temporal_stabilization = true
use_fp16 = true
batch_size = 1
output_dir = output
artifact_dir = storage/debug
save_artifacts = false
execution_providers = CUDAExecutionProvider,CPUExecutionProvider
