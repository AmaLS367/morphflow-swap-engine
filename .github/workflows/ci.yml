name: ci

on: [ push, pull_request ]

jobs:
 validate:
  runs-on: ubuntu-latest
  steps:
  - name: Checkout
    uses: actions/checkout@v4
  - name: Set up Python 3.12
    uses: actions/setup-python@v5
    with:
     python-version: '3.12'
  - run: python -m pip install --upgrade pip
  - run: pip install -e .[dev]
  - run: ruff check .
  - run: mypy morphflow_swap_engine.py install.py facefusion tests
  - run: pytest tests/test_config.py tests/test_program_helper.py tests/test_state_manager.py tests/test_curl_builder.py -q
